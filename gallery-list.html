<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>활동 현장 - 우상호 캠페인 (v2.1)</title>
    <!-- Google Fonts: Outfit, Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <!-- Pretendard Variable Font -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <link rel="stylesheet" href="style.css">
    <style>
        .list-header {
            padding: 120px 0 60px;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-color));
            color: white;
            text-align: center;
        }

        .list-header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
            min-height: 400px;
        }

        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .list-header h1 {
                font-size: 2rem;
            }
        }
        @media (max-width: 480px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar" style="background-color: white;">
        <div class="container">
            <a href="index.html" class="logo"><span>강원특별자치도지사 후보</span> 우상호</a>
            <ul class="nav-links">
                <li><a href="index.html#hero">홈</a></li>
                <li><a href="index.html#news">최신뉴스</a></li>
                <li><a href="index.html#gallery">활동현장</a></li>
                <li><a href="index.html#profile">후보소개</a></li>
                <li><a href="/kakao" class="kakao-nav-btn" style="text-decoration:none;">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="#3A1D1D" style="flex-shrink:0;"><path d="M12 3C6.477 3 2 6.582 2 11c0 2.682 1.523 5.044 3.855 6.548L5 21l4.08-2.172A11.66 11.66 0 0 0 12 19c5.523 0 10-3.582 10-8S17.523 3 12 3z"/></svg>
                    우상호캠프 카카오톡
                </a></li>
            </ul>
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <header class="list-header">
        <div class="container">
            <h1>활동 현장</h1>
            <p>현장에서 소통하는 우상호 후보의 생생한 모습입니다.</p>
        </div>
    </header>

    <main class="section">
        <div class="container">
            <div class="gallery-grid" id="gallery-grid">
                <div class="text-center" style="grid-column: 1/-1; padding: 100px;">
                    <p style="color: var(--text-muted);">사진을 불러오는 중...</p>
                </div>
            </div>

            <div id="load-more-container" class="text-center" style="margin-top: 60px; display: none;">
                <button id="btn-load-more" class="btn btn-outline" style="min-width: 200px; color: var(--primary-color); border-color: var(--primary-color); background: white;">사진 더보기 +</button>
            </div>
        </div>
    </main>

    <!-- Gallery Modal -->
    <div id="gallery-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="gallery-modal-body">
                <div class="gallery-modal-img-container">
                    <img id="gallery-modal-img" src="" alt="">
                </div>
                <div class="gallery-modal-info">
                    <div id="gallery-modal-desc" class="gallery-modal-desc"></div>
                    <div id="gallery-modal-date" class="gallery-modal-date"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 우상호 강원특별자치도지사 후보 캠페인. All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        let allItems = [];
        let currentIndex = 0;
        const itemsPerPage = 12;

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });

        async function init() {
            try {
                const res = await fetch('/api/gallery');
                if (!res.ok) throw new Error('API Error');
                allItems = await res.json();
                renderBatch();
            } catch (err) {
                console.error(err);
                document.getElementById('gallery-grid').innerHTML = '<p class="text-center" style="grid-column: 1/-1;">데이터를 불러오지 못했습니다.</p>';
            }
        }

        function renderBatch() {
            const grid = document.getElementById('gallery-grid');
            const loadBtn = document.getElementById('load-more-container');
            
            if (currentIndex === 0) grid.innerHTML = '';

            const batch = allItems.slice(currentIndex, currentIndex + itemsPerPage);
            
            if (batch.length > 0) {
                batch.forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'gallery-item animate-up';
                    el.style.cursor = 'pointer';
                    el.innerHTML = `<img src="${item.url}" alt="${item.description}">`;
                    el.onclick = () => openModal(item);
                    grid.appendChild(el);
                    observer.observe(el);
                });
                currentIndex += batch.length;
            }

            loadBtn.style.display = (currentIndex < allItems.length) ? 'block' : 'none';
        }

        function openModal(item) {
            const modal = document.getElementById('gallery-modal');
            const modalImg = document.getElementById('gallery-modal-img');
            const modalDesc = document.getElementById('gallery-modal-desc');
            const modalDate = document.getElementById('gallery-modal-date');

            modalImg.src = item.url;
            modalDesc.textContent = item.description || '현장 사진입니다.';
            modalDate.textContent = item.date || '';
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        // Close logic
        document.querySelectorAll('.close-modal').forEach(btn => {
            btn.onclick = () => {
                document.getElementById('gallery-modal').style.display = 'none';
                document.body.style.overflow = 'auto';
            };
        });

        window.onclick = (e) => {
            if (e.target.classList.contains('modal')) {
                e.target.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        };

        window.onkeydown = (e) => {
            if (e.key === 'Escape') {
                const modal = document.getElementById('gallery-modal');
                modal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        };

        document.getElementById('btn-load-more').addEventListener('click', renderBatch);

        // Mobile Menu Toggle Logic
        const menuToggle = document.getElementById('mobile-menu');
        const navLinks = document.querySelector('.nav-links');
        if (menuToggle && navLinks) {
            menuToggle.onclick = () => {
                menuToggle.classList.toggle('active');
                navLinks.classList.toggle('active');
            };
            navLinks.querySelectorAll('a').forEach(link => {
                link.onclick = () => {
                    menuToggle.classList.remove('active');
                    navLinks.classList.remove('active');
                };
            });
        }

        // Start
        init();
    </script>
</body>

</html>
